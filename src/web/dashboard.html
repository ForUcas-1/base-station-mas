<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaseStation-MAS — 5G基站智能诊断</title>
<style>
:root{--bg:#0d1117;--pn:#161b22;--bd:#30363d;--tx:#c9d1d9;--di:#8b949e;--gn:#3fb950;--rd:#f85149;--or:#d2991d;--pr:#a371f7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:system-ui,sans-serif;height:100vh;overflow:hidden}
.layout{display:grid;grid-template-columns:1fr 340px;grid-template-rows:auto 1fr auto;height:100vh;padding:6px 8px;gap:0}
.header{grid-column:1/-1;text-align:center;padding:4px 0 6px}
.header h1{font-size:26px;color:var(--tx);margin:0;letter-spacing:1px}
.header span{font-size:11px;color:var(--di)}
.pn{background:var(--pn);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.main{display:flex;flex-direction:column;gap:6px;padding-bottom:0}
.topo-row{display:flex;gap:6px;height:calc(100vh - 275px)}
#topo{flex:2;border-radius:8px;border:1px solid var(--bd);background:var(--pn)}
#agent-topo{flex:1;background:var(--pn);border:1px solid var(--bd);border-radius:8px}
.kpi-row{display:flex;gap:6px;padding:0}
.kc{flex:1;background:var(--pn);border:1px solid var(--bd);border-radius:8px;padding:16px 10px;text-align:center}
.kc .l{font-size:10px;color:var(--di);text-transform:uppercase;letter-spacing:.5px}
.kc .v{font-size:30px;font-weight:700;margin-top:4px}
.kc .v.g{color:var(--gn)}.kc .v.r{color:var(--rd)}.kc .v.o{color:var(--or)}
.kc .s{font-size:10px;color:var(--di);margin-top:2px}
/* SVG Topology */
.tn{fill:#21262d;stroke:#484f58;stroke-width:2}
.tn.hl{fill:#3d1f1f;stroke:var(--rd);stroke-width:3}
.te{stroke:#484f58;stroke-width:2}
.te.hl{stroke:var(--rd);stroke-width:3;marker-end:url(#arrhl)}
/* Agent Flow */
.ag-rect{fill:#21262d;stroke:#484f58;stroke-width:2.5}
.ag-rect.running{fill:#3d2f00;stroke:var(--or)}
.ag-rect.done{fill:#1a3a1a;stroke:var(--gn)}
.msgbox{display:flex;flex-direction:column}
.msgbox h5{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:13px;color:var(--di)}
#msgs{flex:1;overflow-y:auto;padding:4px 8px;font-size:12px}
.m{padding:4px 8px;margin:2px 0;border-radius:4px;border-left:3px solid;line-height:1.4}
.m.s{border-color:#58a6ff;background:rgba(88,166,255,.06)}
.m.d{border-color:var(--gn);background:rgba(63,185,80,.06)}
.m.x{border-color:var(--or);background:rgba(210,153,29,.06)}
.m.r{border-color:var(--pr);background:rgba(163,113,247,.06)}
.m.e{border-color:var(--rd);background:rgba(248,81,73,.06)}
.m .ts{font-size:10px;color:var(--di)}
#history{max-height:180px;overflow-y:auto;padding:4px 8px;font-size:11px;border-top:1px solid var(--bd)}
.hitem{padding:3px 6px;margin:2px 0;border-radius:4px;background:rgba(255,255,255,.02);cursor:pointer}
.hitem:hover{background:rgba(255,255,255,.05)}
.hitem .hts{font-size:9px;color:var(--di)}
.hitem .hrc{font-size:11px;font-weight:600}
.hitem .hinfo{font-size:10px;color:var(--di)}
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600}
.b1{background:var(--rd);color:#fff}.b2{background:var(--gn);color:#fff}
.bar{grid-column:1/-1;display:flex;align-items:center;gap:8px;background:var(--pn);border:1px solid var(--bd);border-radius:8px 8px 8px 8px;padding:10px 14px;margin-top:-1px}
.bar button{padding:5px 14px;border:1px solid var(--bd);border-radius:5px;background:#21262d;color:var(--tx);cursor:pointer;font-size:13px}
.bar button:hover:not(:disabled){background:#30363d}
.bar button:disabled{opacity:.35;cursor:not-allowed}
.bar .pri{background:#238636;border-color:#2ea043}
.bar .war{background:#9a6700;border-color:var(--or)}
.bar .dan{background:#da3633;border-color:var(--rd)}
.bar select{padding:4px 8px;background:#21262d;color:var(--tx);border:1px solid var(--bd);border-radius:5px;font-size:13px}
.bar .sp{width:1px;height:20px;background:var(--bd);margin:0 2px}
.bar .inf{font-size:12px;color:var(--di)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%}
.dg{background:var(--gn)}.dr{background:var(--rd)}.dp{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="layout">
<div class="header">
  <h1>📡 5G 基站告警智能诊断系统</h1>
  <span>Multi-Agent Architecture · TelecomTS Dataset · GraphRAG</span>
</div>
<div class="main">
  <div class="topo-row">
    <div id="topo">
<svg viewBox="0 0 500 280" style="width:100%;height:100%">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#484f58"/></marker>
    <marker id="arrhl" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f85149"/></marker>
  </defs>

  <!-- ===== 核心区域：BS → 三个Zone ===== -->
  <!-- BS → Zone A (左) -->
  <line id="te_BS_001_ZA_001" class="te" x1="220" y1="85" x2="160" y2="140" marker-end="url(#arr)"/>
  <text x="175" y="110" fill="#8b949e" font-size="8">covers 覆盖</text>
  <!-- BS → Zone B (中) -->
  <line id="te_BS_001_ZB_001" class="te" x1="250" y1="85" x2="250" y2="140" marker-end="url(#arr)"/>
  <text x="257" y="110" fill="#8b949e" font-size="8">covers 覆盖</text>
  <!-- BS → Zone C (右) -->
  <line id="te_BS_001_ZC_001" class="te" x1="280" y1="85" x2="340" y2="140" marker-end="url(#arr)"/>
  <text x="325" y="110" fill="#8b949e" font-size="8">covers 覆盖</text>

  <!-- Zone adjacency -->
  <line id="te_ZA_001_ZB_001" class="te" x1="185" y1="155" x2="225" y2="155" stroke-dasharray="4,3"/>
  <line id="te_ZB_001_ZC_001" class="te" x1="275" y1="155" x2="315" y2="155" stroke-dasharray="4,3"/>

  <!-- ===== 外围：Jammer → BS ===== -->
  <line id="te_JAM_001_BS_001" class="te" x1="75" y1="54" x2="183" y2="60" marker-end="url(#arr)"/>
  <text x="125" y="48" fill="#8b949e" font-size="8" text-anchor="middle">interference 噪声干扰</text>

  <!-- ===== 外围：Mobile 连接 ===== -->
  <line id="te_MOB_001_ZA_001" class="te" x1="70" y1="230" x2="145" y2="170" marker-end="url(#arr)"/>
  <text x="90" y="195" fill="#8b949e" font-size="8">located 接入</text>
  <line id="te_MOB_001_ZB_001" class="te" x1="95" y1="235" x2="235" y2="170" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <text x="140" y="210" fill="#8b949e" font-size="8">moves_to 移动</text>
  <line id="te_MOB_002_ZB_001" class="te" x1="380" y1="245" x2="275" y2="165" marker-end="url(#arr)"/>
  <text x="340" y="200" fill="#8b949e" font-size="8">located 接入</text>

  <!-- ===== 核心节点（大） ===== -->
  <!-- BaseStation -->
  <rect id="tn_BS_001" class="tn" x="185" y="45" width="100" height="55" rx="10"/>
  <text x="235" y="65" fill="#c9d1d9" font-size="13" text-anchor="middle" font-weight="bold">📡 BaseStation</text>
  <text x="235" y="81" fill="#8b949e" font-size="9" text-anchor="middle">基站 · 18 KPI · gNB</text>

  <!-- Zone A (左) -->
  <ellipse id="tn_ZA_001" class="tn" cx="150" cy="165" rx="42" ry="24"/>
  <text x="150" y="161" fill="#c9d1d9" font-size="11" text-anchor="middle" font-weight="bold">🟢 Zone A</text>
  <text x="150" y="176" fill="#8b949e" font-size="9" text-anchor="middle">A区 · 0-3m</text>

  <!-- Zone B (中) -->
  <ellipse id="tn_ZB_001" class="tn" cx="250" cy="165" rx="42" ry="24"/>
  <text x="250" y="161" fill="#c9d1d9" font-size="11" text-anchor="middle" font-weight="bold">🟡 Zone B</text>
  <text x="250" y="176" fill="#8b949e" font-size="9" text-anchor="middle">B区 · 3-6m</text>

  <!-- Zone C (右) -->
  <ellipse id="tn_ZC_001" class="tn" cx="350" cy="165" rx="42" ry="24"/>
  <text x="350" y="161" fill="#c9d1d9" font-size="11" text-anchor="middle" font-weight="bold">🟠 Zone C</text>
  <text x="350" y="176" fill="#8b949e" font-size="9" text-anchor="middle">C区 · &gt;6m</text>

  <!-- ===== 外围节点（小） ===== -->
  <!-- Jammer (左上角) -->
  <rect id="tn_JAM_001" class="tn" x="5" y="35" width="70" height="38" rx="6"/>
  <text x="40" y="54" fill="#c9d1d9" font-size="10" text-anchor="middle" font-weight="bold">🔴 Jammer</text>
  <text x="40" y="66" fill="#8b949e" font-size="8" text-anchor="middle">噪声干扰器</text>

  <!-- Mobile 1 (左下角) -->
  <polygon id="tn_MOB_001" class="tn" points="45,220 80,260 10,260"/>
  <text x="45" y="240" fill="#c9d1d9" font-size="9" text-anchor="middle" font-weight="bold">📱 M1</text>
  <text x="45" y="255" fill="#8b949e" font-size="8" text-anchor="middle">终端1</text>
  <text x="45" y="270" fill="#8b949e" font-size="8" text-anchor="middle">bilibili</text>

  <!-- Mobile 2 (右下角) -->
  <polygon id="tn_MOB_002" class="tn" points="375,225 415,270 335,270"/>
  <text x="375" y="248" fill="#c9d1d9" font-size="9" text-anchor="middle" font-weight="bold">📱 M2</text>
  <text x="375" y="265" fill="#8b949e" font-size="8" text-anchor="middle">终端2</text>
  <text x="375" y="280" fill="#8b949e" font-size="8" text-anchor="middle">File</text>
</svg>
    </div>
    <div id="agent-topo">
<svg viewBox="0 0 340 280" style="width:100%;height:100%">
  <defs>
    <marker id="aga" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="2 0,10 4,2 8" fill="#484f58"/></marker>
  </defs>
  <!-- Edges: Orchestrator → Workers (扇形展开) -->
  <line x1="170" y1="45" x2="63" y2="103" stroke="#484f58" stroke-width="3" marker-end="url(#aga)"/>
  <line x1="170" y1="45" x2="170" y2="103" stroke="#484f58" stroke-width="3" marker-end="url(#aga)"/>
  <line x1="170" y1="45" x2="277" y2="103" stroke="#484f58" stroke-width="3" marker-end="url(#aga)"/>
  <!-- Edges: Workers → Evaluator (汇聚) -->
  <line x1="63" y1="142" x2="150" y2="210" stroke="#484f58" stroke-width="3" marker-end="url(#aga)"/>
  <line x1="170" y1="142" x2="170" y2="210" stroke="#484f58" stroke-width="3" marker-end="url(#aga)"/>
  <line x1="277" y1="142" x2="190" y2="210" stroke="#484f58" stroke-width="3" marker-end="url(#aga)"/>
  <!-- Nodes -->
  <rect id="ag_Orchestrator" class="ag-rect idle" x="95" y="3" width="150" height="42" rx="8"/>
  <text x="170" y="24" fill="#c9d1d9" font-size="12" text-anchor="middle" font-weight="bold">🧠 Orchestrator</text>
  <text x="170" y="38" fill="#8b949e" font-size="9" text-anchor="middle">调度器</text>
  <rect id="ag_Detection" class="ag-rect idle" x="18" y="103" width="90" height="40" rx="6"/>
  <text x="63" y="122" fill="#c9d1d9" font-size="11" text-anchor="middle" font-weight="bold">📡 Detection</text>
  <text x="63" y="136" fill="#8b949e" font-size="8" text-anchor="middle">异常检测</text>
  <rect id="ag_Diagnosis" class="ag-rect idle" x="125" y="103" width="90" height="40" rx="6"/>
  <text x="170" y="122" fill="#c9d1d9" font-size="11" text-anchor="middle" font-weight="bold">🛠️ Diagnosis</text>
  <text x="170" y="136" fill="#8b949e" font-size="8" text-anchor="middle">根因诊断</text>
  <rect id="ag_Reporter" class="ag-rect idle" x="232" y="103" width="90" height="40" rx="6"/>
  <text x="277" y="122" fill="#c9d1d9" font-size="11" text-anchor="middle" font-weight="bold">💬 Reporter</text>
  <text x="277" y="136" fill="#8b949e" font-size="8" text-anchor="middle">报告生成</text>
  <rect id="ag_Evaluator" class="ag-rect idle" x="95" y="215" width="150" height="42" rx="8"/>
  <text x="170" y="236" fill="#c9d1d9" font-size="12" text-anchor="middle" font-weight="bold">✅ Evaluator</text>
  <text x="170" y="250" fill="#8b949e" font-size="9" text-anchor="middle">质量评估</text>
</svg>
    </div>
  </div>
  <div class="kpi-row">
    <div class="kc"><div class="l">异常概率</div><div class="v" id="k1">—</div><div class="s" id="s1"></div></div>
    <div class="kc"><div class="l">根因</div><div class="v" id="k2" style="font-size:17px">—</div><div class="s" id="s2"></div></div>
    <div class="kc"><div class="l">置信度</div><div class="v" id="k3">—</div></div>
    <div class="kc"><div class="l">受影响KPI</div><div class="v" id="k4" style="font-size:13px">—</div></div>
    <div class="kc"><div class="l">耗时</div><div class="v" id="k5">—</div><div class="s" id="s5"></div></div>
    <div class="kc"><div class="l">样本</div><div class="v" id="k6" style="font-size:17px">—</div><div class="s" id="s6"></div></div>
  </div>
</div>
<div class="pn msgbox">
  <h5>📋 诊断事件</h5>
  <div id="msgs"><div class="m s"><span class="ts">—</span> 连接中...</div></div>
  <h5 style="border-top:1px solid var(--bd)">📜 历史记录</h5>
  <div id="history"><div class="hitem"><span class="hts">—</span> 暂无记录</div></div>
</div>
<div class="bar">
  <span class="inf">样本:</span>
  <button id="btn-norm" onclick="pickNormal()">正常</button>
  <button id="btn-anom" onclick="pickAnomaly()" class="war">异常</button>
  <span id="cs" class="inf">—</span>
  <span class="sp"></span>
  <button onclick="send({cmd:'run_oneshot'})" class="pri">▶ 一次性</button>
  <button onclick="startMon()">⏱ 定时</button>
  <button onclick="send({cmd:'stop_monitor'})" class="dan" id="bs" disabled>⏹ 停止</button>
  <span class="sp"></span><span class="inf">间隔</span>
  <select id="iv"><option>5s</option><option>10s</option><option selected>15s</option><option>30s</option><option>60s</option></select>
  <span style="flex:1"></span>
  <span id="st"><span class="dot dr"></span> 空闲</span>
</div>
</div>

<script>
// ── Globals ──
var ws, mode='idle',curSample=null;

function hlBtn(id){$('btn-norm').style.outline='';$('btn-anom').style.outline='';$(id).style.outline='2px solid var(--or)';$('btn-norm').classList.remove('war');$('btn-anom').classList.add('war')}
function $(id){return document.getElementById(id)}

// ── Network Topology (pure HTML/SVG, no external lib) ──
function hlTopo(nodes,edges){
  // Reset all
  document.querySelectorAll('.tn').forEach(function(el){el.classList.remove('hl')});
  document.querySelectorAll('.te').forEach(function(el){el.classList.remove('hl')});
  // Highlight
  (nodes||[]).forEach(function(id){
    var el=document.getElementById('tn_'+id);
    if(el) el.classList.add('hl');
  });
  (edges||[]).forEach(function(e){
    var el=document.getElementById('te_'+e[0]+'_'+e[1]);
    if(el) el.classList.add('hl');
  });
}

// ── Agent Topology (pure HTML/CSS) ──
var AGENT_LIST=['Orchestrator','Detection','Diagnosis','Reporter','Evaluator'];
function setAgent(name,state){
  var el=document.getElementById('ag_'+name);
  if(el){el.setAttribute('class','ag-rect '+state)}
}
function resetAgents(){AGENT_LIST.forEach(function(a){setAgent(a,'idle')})}
var RC_CN={
  'Jamming':'人为宽带噪声干扰','Antenna Failure':'天线故障',
  'Co-Channel Interference (Mild)':'同频干扰(轻度)',
  'Co-Channel Interference (Severe)':'同频干扰(严重)',
  'Faulty RF Filters (Temporal)':'射频滤波器故障',
  'Doppler Shift (Severe)':'多普勒频移',
  'Faulty Handover Algorithm (Too Frequent)':'切换算法故障',
  'Buffer Overflow (Gradual Buildup)':'缓冲区溢出',
  'Resource Allocation Bugs':'资源分配异常',
  'High Network Congestion (Gradual Buildup)':'网络拥塞(渐进)',
  'High Network Congestion (Sudden Spike)':'网络拥塞(突发)'
};
function setRootCause(rc){
  setK('k2',rc||'—',rc?'r':'');
  $('s2').textContent=RC_CN[rc]||'';
}

// ── History ──
$('history').addEventListener('click',function(e){
  var t=e.target, hitem=t.closest('.hitem');
  if(!hitem) return;
  if(t.classList.contains('hdel')){e.stopPropagation();delHist(t.dataset.rid,e);return}
  var rpt=hitem.dataset.rpt;
  if(rpt) openRptWindow(rpt);
});
loadHistory();

function loadHistory(){
  var h=$('history');h.innerHTML='<div class="hitem"><span class="hts">⏳</span> 加载中...</div>';
  fetch('/api/history?limit=15').then(function(r){return r.json()}).then(function(data){
    var html='';
    if(!data||!data.length){h.innerHTML='<div class="hitem"><span class="hts">—</span> 暂无记录 ('+(data?data.length:0)+'条)</div>';return}
    data.forEach(function(d){
      var rc=d.root_cause||'正常',cn=RC_CN[rc]||'';
      var dstr=d.created_at||'';var ts=dstr?new Date(dstr+'Z').toLocaleTimeString('zh-CN',{hour12:false}):'';
      html+='<div class="hitem" data-rpt="'+esc(d.report_markdown||'')+'">';
      html+='<span class="hdel" style="float:right;color:var(--rd);font-weight:bold" data-rid="'+d.run_id+'">✕</span>';
      html+='<span class="hts">'+ts+'</span> ';
      html+='<span class="hrc" style="color:'+(d.has_anomaly?'var(--rd)':'var(--gn)')+'">'+(d.has_anomaly?'⚠':'✅')+' '+(cn||rc)+'</span>';
      html+=' <span class="hinfo">'+(d.anomaly_score?((d.anomaly_score*100).toFixed(0)+'%'):'')+' #'+d.sample_index+'</span>';
      html+='</div>';
    });
    h.innerHTML=html;
  }).catch(function(e){h.innerHTML='<div class="hitem"><span class="hts">⚠</span> 加载失败: '+e.message+'</div>'})
}
function connect(){
  var url='ws://'+location.host+'/ws';
  log('s','⏳ 连接 '+url);
  try{ws=new WebSocket(url)}catch(e){log('e','WS error: '+e.message);return}
  ws.onopen=()=>log('s','🟢 已连接');
  ws.onerror=()=>log('e','❌ WS错误');
  ws.onmessage=e=>{try{var d=JSON.parse(e.data);onEvent(d)}catch(_){}}
  ws.onclose=e=>{log('e','🔴 断开('+e.code+')，3s后重连');setTimeout(connect,3000)}
}
function send(obj){if(ws&&ws.readyState===1)ws.send(JSON.stringify(obj))}
function startMon(){send({cmd:'start_monitor',interval_sec:parseInt($('iv').value)})}
async function pickNormal(){hlBtn('btn-norm');send({cmd:'select_sample',type:'normal'})}
async function pickAnomaly(){hlBtn('btn-anom');send({cmd:'select_sample',type:'anomaly'})}

// ── Events ──
function onEvent(d){
  switch(d.type){
    case 'sample_loaded':
      log('s','📥 <b>#'+d.sample_index+'</b> <span class="badge '+(d.anomaly_type?'b1':'b2')+'">'+(d.anomaly_type||'正常')+'</span>');
      setK('k1','—');setRootCause('');setK('k3','—');setK('k4','—');setK('k5','—');
      setK('k6','#'+d.sample_index,'');$('s6').textContent=d.anomaly_type||'';
      $('cs').textContent='#'+d.sample_index+(d.anomaly_type?' ('+d.anomaly_type+')':' (正常)');
      hlTopo([],[]);resetAgents();
      break;
    case 'detection_done':
      log(d.has_anomaly?'d':'s',(d.has_anomaly?'<span class="badge b1">⚠ 异常</span>':'<span class="badge b2">✅ 正常</span>')+' | '+(d.anomaly_score*100).toFixed(1)+'% | '+(d.affected_kpis||[]).join(', ')+' | '+(d.inference_time_ms||0).toFixed(0)+'ms');
      if(d.has_anomaly){setK('k1',(d.anomaly_score*100).toFixed(1)+'%','r');setK('k4',(d.affected_kpis||[]).join(', '),'');}
      else{setK('k1','—','g');setRootCause('');setK('k3','—');}
      setAgent('Detection','done');
      break;
    case 'round_complete':
      log(d.has_anomaly?'r':'s',(d.has_anomaly?'<span class="badge b1">异常</span> <b>'+(d.root_cause||'?')+'</b> ('+((d.confidence||0)*100).toFixed(0)+'%)':'<span class="badge b2">正常</span>')+' — '+(d.latency_ms||0).toFixed(0)+'ms'+(d.report_markdown?' <a href="#" onclick="showRpt(event)" data-rpt="'+esc(d.report_markdown)+'">📊</a>':''));
      setK('k1',d.anomaly_score!=null?(d.anomaly_score*100).toFixed(1)+'%':'—',d.has_anomaly?'r':'g');
      setRootCause(d.root_cause||'');
      setK('k3',d.confidence!=null?(d.confidence*100).toFixed(1)+'%':'—','');
      setK('k4',(d.affected_kpis||[]).join(', ')||'—','');
      setK('k5',d.latency_ms?d.latency_ms.toFixed(0)+'ms':'—','');
      $('s5').textContent=d.check_num?'#'+d.check_num:'';
      setAgent('Diagnosis','done');setAgent('Reporter','done');setAgent('Evaluator','done');
      setTimeout(resetAgents,2000);
      setTimeout(loadHistory,500);
      break;
    case 'monitor_tick':
      log('s','🔄 #'+d.check_num+' | <b>#'+d.sample_index+'</b> <span class="badge '+(d.anomaly_type&&d.anomaly_type!=='None'?'b1':'b2')+'">'+(d.anomaly_type||'正常')+'</span>');
      $('k6').textContent='#'+d.sample_index;$('s6').textContent=d.anomaly_type||'';
      break;
    case 'topology_highlight':
      hlTopo(d.nodes,d.edges);
      break;
    case 'monitor_started':
      log('s','⏱ 定时监测启动 | '+d.interval_sec+'s');st('running');
      break;
    case 'monitor_stopped':
      log('s','⏹ '+d.reason);st('stopped');
      setTimeout(resetAgents,2000);
      setTimeout(loadHistory,500);
      break;
    case 'agent_status':
      setAgent(d.agent, d.status);
      break;
    case 'error':
      log('e','❌ '+d.message);
      break;
  }
}

function log(c,h){
  var m=$('msgs'),ts=new Date().toLocaleTimeString('zh-CN',{hour12:false});
  var div=document.createElement('div');div.className='m '+c;
  div.innerHTML='<span class="ts">'+ts+'</span> '+h;
  m.appendChild(div);m.scrollTop=m.scrollHeight;
  while(m.children.length>80)m.firstChild.remove();
}
function setK(id,v,c){var e=$(id);e.textContent=v;e.className='v'+(c?' '+c:'');}
function st(m){
  if(m==='running'){$('st').innerHTML='<span class="dot dg dp"></span> 监测中';$('bs').disabled=false;mode='timed'}
  else{$('st').innerHTML='<span class="dot dr"></span> 空闲';$('bs').disabled=true;mode='idle'}
}
async function delHist(runId){if(!confirm('删除？'))return;await fetch('/api/history/'+runId,{method:'DELETE'});loadHistory()}
function openRptWindow(md){
  var b='<!DOCTYPE html><html><head><meta charset=UTF-8><style>';
  b+='body{background:#0d1117;color:#c9d1d9;font:14px/1.7 system-ui,sans-serif;padding:32px 40px;max-width:800px;margin:0 auto}';
  b+='h1{font-size:22px;border-bottom:2px solid #30363d;padding-bottom:12px}';
  b+='h2{font-size:17px;color:#58a6ff;margin-top:28px}';
  b+='h3{font-size:14px;color:#d2991d;margin-top:20px}';
  b+='strong{color:#f5f5f7}';
  b+='table{width:100%;border-collapse:collapse;margin:12px 0}';
  b+='td,th{border:1px solid #30363d;padding:8px 12px;font-size:13px}';
  b+='th{background:#161b22;color:#8b949e;font-weight:600}';
  b+='code{background:#161b22;padding:2px 6px;border-radius:3px;font-size:12px;color:#d2a8ff}';
  b+='hr{border:none;border-top:1px solid #30363d;margin:24px 0}';
  b+='blockquote{border-left:3px solid #58a6ff;margin:12px 0;padding:4px 16px;color:#8b949e;background:rgba(88,166,255,.04)}';
  b+='</style></head><body>';
  var h=md.replace(/^### (.+)/gm,'<h3>$1</h3>').replace(/^## (.+)/gm,'<h2>$1</h2>').replace(/^# (.+)/gm,'<h1>$1</h1>');
  h=h.replace(/^---+/gm,'<hr>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/^> (.+)/gm,'<blockquote>$1</blockquote>').replace(/\n\n/g,'<br><br>');
  b+=h+'</body></html>';
  var w=window.open('','_blank','width=750,height=600');w.document.write(b);
}

function showRpt(e){e.preventDefault();openRptWindow(e.target.getAttribute("data-rpt")||"")}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
connect();
</script>

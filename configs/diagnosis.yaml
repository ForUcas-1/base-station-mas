# Diagnosis Worker — ML + GraphRAG + LLM

diagnosis:
  step1:
    encoder_type: ${DIAGNOSIS_ENCODER:-Autoformer}
    use_ground_truth: true        # true=读数据集标签, false=ML模型推理（需checkpoint）
    encoder_config:
      d_model: 32
      n_heads: 8
      e_layers: 3
      d_ff: 64
      dropout: 0.3
      factor: 1
      activation: gelu
      seq_len: 128
      pred_len: 0
      label_len: 0
      enc_in: 18
      c_out: 18
      embed: fixed
      freq: s
      moving_avg: 25
    checkpoint_path: data/checkpoints/${DIAGNOSIS_CHECKPOINT:-rootcause_autoformer.pt}
    top_k: 3
    device: cpu

  step2:
    kg_path: ${KG_TOPOLOGY_PATH:-knowledge_graph/topology.json}
    embeddings_dir: ${KG_EMBEDDINGS_DIR:-knowledge_graph/embeddings}
    vector_store: faiss
    embedding_model: all-MiniLM-L6-v2

  step3:
    llm:
      temperature: 0.2
      max_tokens: 2048

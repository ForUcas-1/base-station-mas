task_type: 'anomaly detection' # 'anomaly detection' | 'root-cause analysis' | 'anomaly duration' | 'forecasting'

encoder_type: 'TimesNet'       # 'TimesNet' | 'Autoformer' | 'NonStationary_Transformer' | 'FEDformer' | 'Informer' | 'Chronos' | 'Toto' | 'Mantis'

seed: 42

train:
  batch_size: 32
  epochs: 5
  optim:
    lr: 0.001
    weight_decay: 0.0001
    betas: [0.9, 0.999]

TimesNet_model:
  seq_len: 128
  pred_len: 0
  top_k: 3
  enc_in: 18
  d_model: 32
  d_ff: 64
  num_kernels: 4
  embed: "fixed"
  freq: "0.1s"
  dropout: 0.3
  e_layers: 2

Informer_model:
    d_model:    32
    n_heads:    8
    e_layers:   3
    d_ff:       64
    dropout:    0.3
    factor:     1
    activation: "gelu"
    seq_len:    128    # T
    label_len:  0      # not used for recon
    pred_len:   0      # recon only
    enc_in:     18     # C (input channels)
    dec_in:     18     # for decoder embedding
    c_out:      18     # must match enc_in for recon
    embed:      "fixed"
    freq:       "h"
    moving_avg: 25

FEDformer_model:
    d_model: 32
    n_heads: 8
    e_layers: 3
    d_ff: 64
    dropout: 0.3
    activation: 'gelu'
    embed: 'timeF'
    freq: 's'
    seq_len: 128
    label_len: 0
    pred_len: 0
    enc_in: 18          # input channels C
    dec_in: 18          # unused here
    c_out: 18           # must equal enc_in for reconstruction
    version: 'fourier'  # 'fourier' or 'wavelets'
    mode_select: 'random'  # 'random' or 'low'
    modes: 32           # number of modes to select
    moving_avg: 25

Autoformer_model:
    d_model:    32
    n_heads:    8
    e_layers:   3
    d_ff:       64
    dropout:    0.3
    factor:     1
    activation: "gelu"
    seq_len:    128   # T
    pred_len:   0
    label_len:  0
    enc_in:     18    # C (input channels)
    c_out:      18    # must match enc_in for recon
    embed:      "fixed"
    freq:       "s"
    moving_avg: 25

NonStationary_Transformer_model:
    d_model:   32
    n_heads:   8
    e_layers:  3
    d_ff:      64
    dropout:   0.3
    factor:    1
    activation: "gelu"
    seq_len:   128    # T
    label_len: 0      # not used here
    pred_len:  0      # pure reconstruction; keep 0
    enc_in:    18     # C_in == c_out for reconstruction
    c_out:     18
    embed:     "fixed"
    freq:      "h"
    p_hidden_dims:   [128, 128]
    p_hidden_layers: 2

Chronos_model:
    # Chronos-style tokenizer + T5 encoder, randomly initialized (end-to-end trainable).
    # Reuses the MeanScaleUniformBins tokenizer from amazon/chronos-t5-tiny.
    seq_len:   128
    enc_in:    18
    d_model:   64
    d_kv:      16
    d_ff:      128
    n_heads:   4
    e_layers:  2
    dropout:   0.3

Toto_model:
    # Datadog Toto backbone, randomly initialized (end-to-end trainable).
    seq_len:                   128
    enc_in:                    18
    d_model:                   64
    embed_dim:                 64       # internal Toto patch-embedding dim
    patch_size:                8
    stride:                    8
    e_layers:                  4        # number of transformer layers
    n_heads:                   4
    d_ff:                      128      # mlp_hidden_dim inside the transformer
    dropout:                   0.1
    spacewise_every_n_layers:  2
    k_components:              4        # mixture components of the output distribution

Mantis_model:
    # Mantis-V1 backbone (per-channel), randomly initialized (end-to-end trainable).
    seq_len:           128
    enc_in:            18
    d_model:           64
    hidden_dim:        64
    num_patches:       8        # seq_len must be a multiple of num_patches
    e_layers:          4        # transf_depth
    n_heads:           4        # transf_num_heads
    d_ff:              128      # transf_mlp_dim
    transf_dim_head:   32
    dropout:           0.1

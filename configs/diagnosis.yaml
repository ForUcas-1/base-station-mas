# Diagnosis Worker — ML + GraphRAG + LLM

diagnosis:
  step1:
    encoder_type: ${DIAGNOSIS_ENCODER:-TimesNet}
    use_ground_truth: false       # true=读数据集标签, false=ML模型推理（需checkpoint）
    encoder_config:
      seq_len: 128
      pred_len: 0
      top_k: 8
      enc_in: 18
      d_model: 32
      d_ff: 64
      num_kernels: 4
      embed: fixed
      freq: 0.1s
      dropout: 0.3
      e_layers: 2
    checkpoint_path: data/checkpoints/${DIAGNOSIS_CHECKPOINT:-rootcause_timesnet.pt}
    top_k: 3
    device: cpu

  step2:
    kg_path: ${KG_TOPOLOGY_PATH:-knowledge_graph/topology.json}
    embeddings_dir: ${KG_EMBEDDINGS_DIR:-knowledge_graph/embeddings}
    vector_store: faiss
    embedding_model: all-MiniLM-L6-v2

  step3:
    llm:
      temperature: 0.2
      max_tokens: 2048
